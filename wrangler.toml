name = "three-rooms"
# Legacy deployment name retained to preserve existing Durable Object session storage.
main = "worker.js"
compatibility_date = "2026-04-04"
workers_dev = true

assets = { directory = "./docs", binding = "ASSETS" }

routes = [
  { pattern = "frrl.deviantclaw.art", custom_domain = true }
]

[[durable_objects.bindings]]
name = "SESSION_STORE"
class_name = "SessionStore"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionStore"]
